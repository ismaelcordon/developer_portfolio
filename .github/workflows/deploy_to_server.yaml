name: Deploy to Server

on:
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
    deploy:
        runs-on: [self-hosted, ismaelcordon, website]
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Create .env for portfolio
              run: |
                  cat > apps/developer_portfolio/.env << EOF
                  VITE_SERVER_BASE_URL=${{ secrets.VITE_SERVER_BASE_URL }}
                  VITE_UMAMI_WEBSITE_ID=${{ secrets.VITE_UMAMI_WEBSITE_ID }}
                  EOF

            - name: Create .env for blog editor
              run: |
                  cat > apps/blog_editor/.env << EOF
                  VITE_PORTFOLIO_API_KEY=${{ secrets.VITE_PORTFOLIO_API_KEY }}
                  VITE_SERVER_BASE_URL=${{ secrets.VITE_SERVER_BASE_URL }}
                  EOF

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build blog-shared
              run: pnpm --filter @ismael-cordon/blog-shared build

            - name: Build and deploy portfolio
              run: |
                  pnpm --filter developer_portfolio build
                  rm -rf ~/deployments/developer_portfolio/*
                  cp -r apps/developer_portfolio/dist/* ~/deployments/portfolio/
                  echo "✅ Portfolio deployed!"

            - name: Build and deploy blog editor
              run: |
                  pnpm --filter blog_editor build
                  rm -rf ~/deployments/blog_editor/*
                  cp -r apps/blog_editor/dist/* ~/deployments/blog_editor/
                  echo "✅ Blog editor deployed!"

            - name: Send Telegram Notification
              if: always()
              env:
                  JOB_STATUS: ${{ job.status }}
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manually triggered' }}
                  AUTHOR: ${{ github.actor }}
                  REPOSITORY: ${{ github.repository }}
              run: |
                  echo "... Setting up telegram message ..."

                  # Definimos el emoji y texto de estado
                  if [ "$JOB_STATUS" = "success" ]; then
                    STATUS_TEXT="✅ <b>DEPLOYMENT SUCCESSFUL</b>"
                  else
                    STATUS_TEXT="❌ <b>ERROR IN THE DEPLOYMENT</b>"
                  fi

                  # Construimos el mensaje usando Markdown
                  MESSAGE=$(cat <<EOF
                  $STATUS_TEXT

                  📦 <b>Project:</b> $REPOSITORY
                  🚀 <b>Environment:</b> Develop
                  🌿 <b>Branch:</b> $SOURCE_BRANCH
                  📝 <b>Commit/Trigger:</b> $COMMIT_MESSAGE
                  👤 <b>Author:</b> $AUTHOR
                  EOF
                  )

                  # Enviamos el mensaje a la API de Telegram
                  curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                    -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                    -d text="$MESSAGE" \
                    -d parse_mode="HTML"

            - name: Log
              run: |
                  echo "=========================================="
                  echo "✅ DEPLOYMENT COMPLETED"
                  echo "=========================================="

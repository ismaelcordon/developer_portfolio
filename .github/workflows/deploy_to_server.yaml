name: Deploy to Server

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
    deploy:
        runs-on: [self-hosted, ismaelcordon, website]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Detect changes
              id: changes
              run: |
                  if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                    echo "portfolio=true" >> $GITHUB_OUTPUT
                    echo "blog=true" >> $GITHUB_OUTPUT
                  else
                    CHANGED=$(git diff --name-only HEAD~1 HEAD)
                      echo "$CHANGED"

                    if echo "$CHANGED" | grep -q "^apps/developer_portfolio/\|^packages/blog-shared/"; then
                      echo "portfolio=true" >> $GITHUB_OUTPUT
                    else
                      echo "portfolio=false" >> $GITHUB_OUTPUT
                    fi

                    if echo "$CHANGED" | grep -q "^apps/blog_editor/\|^packages/blog-shared/"; then
                      echo "blog=true" >> $GITHUB_OUTPUT
                    else
                      echo "blog=false" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Create .env for portfolio
              if: steps.changes.outputs.portfolio == 'true'
              run: |
                  cat > apps/developer_portfolio/.env << EOF
                  VITE_SERVER_BASE_URL=${{ secrets.VITE_SERVER_BASE_URL }}
                  VITE_UMAMI_WEBSITE_ID=${{ secrets.VITE_UMAMI_WEBSITE_ID }}
                  EOF

            - name: Create .env for blog editor
              if: steps.changes.outputs.blog == 'true'
              run: |
                  cat > apps/blog_editor/.env << EOF
                  VITE_PORTFOLIO_API_KEY=${{ secrets.VITE_PORTFOLIO_API_KEY }}
                  VITE_SERVER_BASE_URL=${{ secrets.VITE_SERVER_BASE_URL }}
                  EOF

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build blog-shared
              if: steps.changes.outputs.portfolio == 'true' || steps.changes.outputs.blog == 'true'
              run: pnpm --filter @ismael-cordon/blog-shared build

            - name: Build and deploy portfolio
              if: steps.changes.outputs.portfolio == 'true'
              run: |
                  pnpm --filter developer_portfolio build
                  rm -rf ~/deployments/developer_portfolio/*
                  cp -r apps/developer_portfolio/dist/* ~/deployments/portfolio/
                  echo "✅ Portfolio deployed!"

            - name: Build and deploy blog editor
              if: steps.changes.outputs.blog == 'true'
              run: |
                  pnpm --filter blog_editor build
                  rm -rf ~/deployments/blog_editor/*
                  cp -r apps/blog_editor/dist/* ~/deployments/blog_editor/
                  echo "✅ Blog editor deployed!"

            - name: Notify Telegram
              if: success()
              run: |
                  MESSAGE="✅ Deployment completed successfully!%0A"
                  MESSAGE+="Branch: ${{ github.ref_name }}%0A"
                  MESSAGE+="Commit: ${{ github.sha }}"
                  curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                    -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                    -d text="$MESSAGE"

            - name: Notify Telegram on failure
              if: failure()
              run: |
                  MESSAGE="❌ Deployment FAILED!%0A"
                  MESSAGE+="Branch: ${{ github.ref_name }}%0A"
                  MESSAGE+="Commit: ${{ github.sha }}"
                  curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                    -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                    -d text="$MESSAGE"

            - name: Log
              run: |
                  echo "=========================================="
                  echo "✅ DEPLOYMENT COMPLETED"
                  echo "=========================================="
